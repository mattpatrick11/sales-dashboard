<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notepad — Matt's Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --green-900:#0D2B1E; --green-800:#1B4332; --green-700:#2D6A4F;
      --green-600:#40916C; --green-500:#52B788; --green-400:#74C69D;
      --green-300:#95D5B2; --green-200:#B7E4C7; --green-100:#D8F3DC;
      --cream:#FEFAE0; --cream-light:#FFFDF7; --cream-dark:#F0E8C0;
      --text-primary:#1B4332; --text-secondary:#40916C; --text-muted:#74C69D;
      --amber:#E9C46A; --amber-dark:#D4A017; --danger:#C1321F;
      --shadow-sm:0 1px 3px rgba(27,67,50,0.08);
      --shadow-md:0 4px 12px rgba(27,67,50,0.12);
      --shadow-lg:0 8px 32px rgba(27,67,50,0.18);
      --radius:14px; --radius-sm:8px;
    }
    html, body { height:100%; }
    body { font-family:'Inter',sans-serif; background:var(--cream); color:var(--text-primary); display:flex; flex-direction:column; min-height:100vh; }

    /* ── HEADER ── */
    .header { background:var(--green-800); padding:0 28px; height:64px; flex-shrink:0; display:flex; align-items:center; justify-content:space-between; box-shadow:0 2px 12px rgba(0,0,0,0.25); position:sticky; top:0; z-index:100; }
    .header-logo { color:#fff; font-weight:700; font-size:1.1rem; display:flex; align-items:center; gap:10px; }
    .header-logo span { color:var(--green-300); }
    .header-nav { display:flex; gap:8px; align-items:center; }
    .header-nav a { color:var(--green-300); text-decoration:none; font-size:0.85rem; font-weight:500; padding:6px 14px; border-radius:6px; transition:background 0.2s,color 0.2s; }
    .header-nav a:hover { background:rgba(255,255,255,0.1); color:#fff; }
    .header-nav a.active { background:var(--green-600); color:#fff; }

    /* ── LAYOUT ── */
    .app { display:flex; flex:1; overflow:hidden; height:calc(100vh - 64px); }

    /* ── SIDEBAR ── */
    .sidebar { width:260px; flex-shrink:0; background:var(--cream-light); border-right:1px solid var(--green-200); display:flex; flex-direction:column; overflow:hidden; }
    .sidebar-header { padding:16px; border-bottom:1px solid var(--green-200); }
    .sidebar-title { font-size:0.75rem; font-weight:700; text-transform:uppercase; letter-spacing:0.8px; color:var(--text-secondary); margin-bottom:10px; }
    .search-wrap { position:relative; }
    .search-wrap input { width:100%; padding:8px 32px 8px 12px; border:1.5px solid var(--green-200); border-radius:var(--radius-sm); font-size:0.85rem; font-family:inherit; background:var(--cream); color:var(--text-primary); outline:none; transition:border-color 0.2s; }
    .search-wrap input:focus { border-color:var(--green-500); }
    .search-wrap .s-icon { position:absolute; right:10px; top:50%; transform:translateY(-50%); color:var(--text-muted); font-size:0.85rem; pointer-events:none; }
    .search-clear { position:absolute; right:8px; top:50%; transform:translateY(-50%); background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:1rem; padding:0 2px; display:none; }
    .search-clear.visible { display:block; }
    .sidebar-list { flex:1; overflow-y:auto; }
    .sidebar-section { padding:10px 16px 4px; font-size:0.7rem; font-weight:700; text-transform:uppercase; letter-spacing:0.8px; color:var(--text-muted); }
    .day-item { display:flex; align-items:flex-start; padding:10px 16px; cursor:pointer; border-left:3px solid transparent; transition:background 0.15s,border-color 0.15s; border-bottom:1px solid rgba(27,67,50,0.05); }
    .day-item:hover { background:var(--green-100); }
    .day-item.active { background:var(--green-100); border-left-color:var(--green-600); }
    .day-info { flex:1; min-width:0; }
    .day-name { font-size:0.85rem; font-weight:600; color:var(--text-primary); margin-bottom:2px; }
    .day-preview { font-size:0.75rem; color:var(--text-muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .day-words { font-size:0.7rem; color:var(--text-muted); margin-top:2px; }
    .today-badge { font-size:0.65rem; font-weight:700; background:var(--green-600); color:#fff; padding:1px 6px; border-radius:100px; margin-left:6px; vertical-align:middle; }
    .no-results { padding:20px 16px; font-size:0.82rem; color:var(--text-muted); text-align:center; }
    mark.search-hit { background:#fef08a; border-radius:2px; }

    /* ── EDITOR AREA ── */
    .editor-area { flex:1; display:flex; flex-direction:column; overflow:hidden; }

    /* Top bar: date + save status */
    .editor-topbar { padding:10px 24px; background:var(--cream-light); border-bottom:1px solid var(--green-200); display:flex; align-items:center; justify-content:space-between; gap:12px; flex-shrink:0; }
    .editor-date-label { font-size:1.05rem; font-weight:700; color:var(--green-900); }
    .editor-date-sub   { font-size:0.75rem; color:var(--text-secondary); margin-top:1px; }
    .topbar-right { display:flex; align-items:center; gap:10px; }
    .save-status { font-size:0.78rem; color:var(--text-muted); display:flex; align-items:center; gap:5px; }
    .save-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; background:var(--green-500); }
    .save-dot.saving { background:var(--amber-dark); animation:pulse 0.8s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .word-count { font-size:0.78rem; color:var(--text-muted); white-space:nowrap; }
    .topbar-btn { padding:6px 13px; border-radius:var(--radius-sm); font-size:0.8rem; font-weight:600; cursor:pointer; border:none; font-family:inherit; transition:background 0.2s; }
    .btn-outline { background:var(--cream-dark); color:var(--text-primary); border:1.5px solid var(--green-200); }
    .btn-outline:hover { background:var(--green-100); }
    .btn-green { background:var(--green-600); color:#fff; }
    .btn-green:hover { background:var(--green-700); }

    /* ── FORMATTING TOOLBAR ── */
    .fmt-toolbar {
      display:flex; align-items:center; gap:2px; flex-wrap:wrap;
      padding:7px 20px;
      background:var(--cream-dark);
      border-bottom:1px solid var(--green-200);
      flex-shrink:0;
    }
    .fmt-btn {
      display:flex; align-items:center; justify-content:center;
      width:30px; height:28px;
      border-radius:5px; border:none; cursor:pointer;
      background:transparent; color:var(--text-primary);
      font-size:0.85rem; font-family:inherit; font-weight:600;
      transition:background 0.15s;
      flex-shrink:0;
    }
    .fmt-btn:hover { background:var(--green-100); }
    .fmt-btn.active { background:var(--green-200); color:var(--green-800); }
    .fmt-btn[title="Bold"]      { font-weight:800; font-size:0.9rem; }
    .fmt-btn[title="Italic"]    { font-style:italic; }
    .fmt-btn[title="Underline"] { text-decoration:underline; }
    .fmt-sep { width:1px; height:20px; background:var(--green-200); margin:0 4px; flex-shrink:0; }

    /* The "Add Note Block" button is wider */
    .fmt-note-btn {
      display:flex; align-items:center; gap:6px;
      padding:0 12px; height:28px;
      border-radius:5px; border:1.5px solid var(--green-400);
      cursor:pointer; background:var(--green-100); color:var(--green-700);
      font-size:0.78rem; font-family:inherit; font-weight:700;
      transition:background 0.15s;
      white-space:nowrap;
    }
    .fmt-note-btn:hover { background:var(--green-200); }

    /* ── SEARCH RESULTS ── */
    #searchResultsArea { display:none; flex:1; overflow-y:auto; padding:24px; flex-direction:column; }
    .sr-header { font-size:1rem; font-weight:700; color:var(--green-900); margin-bottom:4px; }
    .sr-sub { font-size:0.85rem; color:var(--text-secondary); margin-bottom:20px; }
    .sr-result { background:var(--cream-light); border-radius:var(--radius-sm); border:1px solid rgba(27,67,50,0.1); padding:16px 20px; margin-bottom:12px; cursor:pointer; transition:box-shadow 0.15s; }
    .sr-result:hover { box-shadow:var(--shadow-md); }
    .sr-date { font-size:0.78rem; font-weight:700; color:var(--green-700); margin-bottom:6px; }
    .sr-snippet { font-size:0.875rem; color:var(--text-primary); line-height:1.6; }
    .sr-snippet mark { background:#fef08a; border-radius:2px; padding:0 2px; color:var(--green-900); }
    .no-sr { text-align:center; padding:60px 24px; color:var(--text-muted); }
    .no-sr .icon { font-size:2.5rem; margin-bottom:12px; }

    /* ── NOTEPAD EDITOR (contenteditable) ── */
    #notepadWrap { flex:1; overflow:hidden; display:flex; flex-direction:column; }

    #notepad {
      flex:1;
      overflow-y:auto;
      padding:28px 40px;
      font-family:'Inter', sans-serif;
      font-size:1rem;
      line-height:1.85;
      color:var(--text-primary);
      background:var(--cream);
      outline:none;
      cursor:text;
    }
    #notepad:focus { background:var(--cream-light); }

    /* Rich text content styles */
    #notepad p   { margin:0 0 4px; min-height:1.85em; }
    #notepad b, #notepad strong { font-weight:700; }
    #notepad i, #notepad em     { font-style:italic; }
    #notepad u                  { text-decoration:underline; }
    #notepad ul { margin:6px 0 6px 24px; padding:0; }
    #notepad ol { margin:6px 0 6px 24px; padding:0; }
    #notepad li { margin:2px 0; line-height:1.7; }
    #notepad blockquote { border-left:3px solid var(--green-400); margin:8px 0 8px 12px; padding:4px 12px; color:var(--text-secondary); font-style:italic; }

    /* Note block divider */
    .note-block {
      border:none;
      border-top:2px solid var(--green-300);
      margin:18px 0 14px;
      position:relative;
    }
    .note-block-label {
      display:block;
      font-size:0.7rem;
      font-weight:700;
      text-transform:uppercase;
      letter-spacing:1px;
      color:var(--green-500);
      margin-bottom:8px;
      margin-top:16px;
      user-select:none;
    }

    /* Empty state placeholder */
    #notepad:empty::before,
    #notepad p:only-child:empty::before {
      content: attr(data-placeholder);
      color:var(--text-muted);
      font-style:italic;
      pointer-events:none;
    }

    /* ── MODAL ── */
    .modal-overlay { position:fixed; inset:0; background:rgba(13,43,30,0.5); z-index:200; display:none; align-items:center; justify-content:center; }
    .modal-overlay.open { display:flex; }
    .modal { background:var(--cream-light); border-radius:var(--radius); padding:28px; max-width:400px; width:90%; box-shadow:var(--shadow-lg); }
    .modal h3 { font-size:1rem; font-weight:700; margin-bottom:8px; }
    .modal p  { font-size:0.875rem; color:var(--text-secondary); margin-bottom:20px; line-height:1.5; }
    .modal-btns { display:flex; gap:10px; justify-content:flex-end; }
    .modal-btn { padding:8px 18px; border-radius:var(--radius-sm); font-size:0.85rem; font-weight:600; cursor:pointer; border:none; font-family:inherit; }

    /* ── TOAST ── */
    .toast { position:fixed; bottom:24px; right:24px; background:var(--green-800); color:#fff; padding:11px 18px; border-radius:var(--radius-sm); font-size:0.875rem; font-weight:500; box-shadow:var(--shadow-lg); z-index:999; opacity:0; transform:translateY(8px); transition:all 0.25s; pointer-events:none; }
    .toast.show { opacity:1; transform:translateY(0); }

    @media(max-width:700px) {
      .sidebar { width:200px; }
      #notepad { padding:16px 18px; }
      .header-nav a { padding:6px 8px; font-size:0.78rem; }
    }
    @media(max-width:500px) { .sidebar { display:none; } }
  </style>
</head>
<body>

<header class="header">
  <div class="header-logo">📊 <span>Matt's</span>&nbsp;Dashboard</div>
  <nav class="header-nav">
    <a href="index.html">Home</a>
    <a href="outreach.html">Outreach</a>
    <a href="notepad.html" class="active">Notepad</a>
  </nav>
</header>

<div class="app">

  <!-- ── SIDEBAR ── -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">Daily Notes</div>
      <div class="search-wrap">
        <input type="text" id="sidebarSearch" placeholder="Search all notes…" autocomplete="off" />
        <span class="s-icon" id="searchIcon">🔍</span>
        <button class="search-clear" id="searchClear" onclick="clearSearch()" title="Clear">✕</button>
      </div>
    </div>
    <div class="sidebar-list" id="sidebarList"></div>
  </aside>

  <!-- ── EDITOR ── -->
  <div class="editor-area">

    <!-- Date + save status -->
    <div class="editor-topbar">
      <div>
        <div class="editor-date-label" id="editorDateLabel">Loading…</div>
        <div class="editor-date-sub"   id="editorDateSub"></div>
      </div>
      <div class="topbar-right">
        <span class="word-count" id="wordCount"></span>
        <span class="save-status">
          <span class="save-dot" id="saveDot"></span>
          <span id="saveText">Saved</span>
        </span>
        <button class="topbar-btn btn-outline" id="deleteBtn" onclick="confirmDelete()" style="display:none;">🗑 Delete</button>
        <button class="topbar-btn btn-green"   onclick="saveNow()">💾 Save</button>
      </div>
    </div>

    <!-- Formatting toolbar -->
    <div class="fmt-toolbar" id="fmtToolbar">
      <!-- Text style -->
      <button class="fmt-btn" title="Bold"      onclick="fmt('bold')"                    >B</button>
      <button class="fmt-btn" title="Italic"    onclick="fmt('italic')"                  >I</button>
      <button class="fmt-btn" title="Underline" onclick="fmt('underline')"               >U</button>
      <div class="fmt-sep"></div>
      <!-- Headings -->
      <button class="fmt-btn" title="Heading"   onclick="fmtBlock('h3')"   style="font-size:0.72rem;width:36px;">H</button>
      <div class="fmt-sep"></div>
      <!-- Lists -->
      <button class="fmt-btn" title="Bullet list"   onclick="fmt('insertUnorderedList')" >• ≡</button>
      <button class="fmt-btn" title="Numbered list" onclick="fmt('insertOrderedList')"   >1 ≡</button>
      <div class="fmt-sep"></div>
      <!-- Indent -->
      <button class="fmt-btn" title="Indent"   onclick="fmt('indent')"   style="font-size:1rem;">→</button>
      <button class="fmt-btn" title="Outdent"  onclick="fmt('outdent')"  style="font-size:1rem;">←</button>
      <div class="fmt-sep"></div>
      <!-- Highlight -->
      <button class="fmt-btn" title="Highlight" onclick="fmtHighlight()" style="background:#fef08a;border:1px solid #fde047;font-size:0.75rem;width:36px;">HI</button>
      <div class="fmt-sep"></div>
      <!-- Add note block -->
      <button class="fmt-note-btn" onclick="insertNoteBlock()" title="Insert a separator and new note section">＋ New Note</button>
      <div class="fmt-sep"></div>
      <!-- Clear formatting -->
      <button class="fmt-btn" title="Clear formatting" onclick="fmt('removeFormat')" style="font-size:0.7rem;width:36px;color:var(--text-muted);">T✕</button>
    </div>

    <!-- Search results (hidden unless searching) -->
    <div id="searchResultsArea">
      <div class="sr-header" id="srHeader"></div>
      <div class="sr-sub"    id="srSub"></div>
      <div id="srList"></div>
    </div>

    <!-- Rich text notepad -->
    <div id="notepadWrap">
      <div id="notepad"
           contenteditable="true"
           spellcheck="true"
           data-placeholder="Start typing — your notes auto-save. Use the toolbar above to add bold text, bullets, headings, or click ＋ New Note to drop a divider between separate notes…"
      ></div>
    </div>

  </div>
</div>

<!-- Delete modal -->
<div class="modal-overlay" id="deleteModal">
  <div class="modal">
    <h3>Delete this note?</h3>
    <p id="deleteModalMsg"></p>
    <div class="modal-btns">
      <button class="modal-btn" style="background:var(--cream-dark);border:1.5px solid var(--green-200);color:var(--text-primary);" onclick="closeDeleteModal()">Cancel</button>
      <button class="modal-btn" style="background:#fee2e2;color:var(--danger);" onclick="doDelete()">Delete</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════
//  STORAGE
// ══════════════════════════════════════════
const LS_PREFIX = 'gmh_notepad_v2_';   // v2 = HTML storage
const LS_INDEX  = 'gmh_notepad_index';

const DAYS        = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTHS      = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const SHORT_MONTHS= ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function todayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function keyToLabel(k) {
  const [y,m,d] = k.split('-').map(Number);
  return `${DAYS[new Date(y,m-1,d).getDay()]} ${m}/${d}/${String(y).slice(2)}`;
}
function keyToFull(k) {
  const [y,m,d] = k.split('-').map(Number);
  return `${DAYS[new Date(y,m-1,d).getDay()]}, ${MONTHS[m-1]} ${d}, ${y}`;
}
function isToday(k) { return k===todayKey(); }

function getIndex()   { try{return JSON.parse(localStorage.getItem(LS_INDEX)||'[]');}catch(e){return[];} }
function saveIndex(i) { localStorage.setItem(LS_INDEX,JSON.stringify(i)); }
function addToIndex(k){ const i=getIndex(); if(!i.includes(k)){i.push(k);i.sort((a,b)=>b.localeCompare(a));saveIndex(i);} }
function removeFromIndex(k){ saveIndex(getIndex().filter(x=>x!==k)); }

function loadNote(k)      { return localStorage.getItem(LS_PREFIX+k)||''; }
function saveNote(k,html) {
  const plain = stripTags(html).trim();
  if(plain){ localStorage.setItem(LS_PREFIX+k,html); addToIndex(k); }
  else     { localStorage.removeItem(LS_PREFIX+k); removeFromIndex(k); }
}
function deleteNote(k) { localStorage.removeItem(LS_PREFIX+k); removeFromIndex(k); }
function getAllNotes()  { return getIndex().map(k=>({key:k,html:loadNote(k),text:stripTags(loadNote(k))})); }

function stripTags(html) {
  const d=document.createElement('div'); d.innerHTML=html; return d.textContent||d.innerText||'';
}

// ══════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════
let currentKey   = todayKey();
let saveDebounce = null;
let isSearchMode = false;
let searchQuery  = '';

// ══════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════
window.addEventListener('DOMContentLoaded', () => {
  loadDay(todayKey());
  startAutoSave();
  setupShortcuts();
});
window.addEventListener('beforeunload', saveCurrentNote);

// ══════════════════════════════════════════
//  LOAD A DAY
// ══════════════════════════════════════════
function loadDay(key) {
  saveCurrentNote();
  currentKey = key;

  const editor = document.getElementById('notepad');
  const html   = loadNote(key);
  editor.innerHTML = html || '';

  // Ensure there's at least one paragraph to type into
  if(!editor.innerHTML.trim()) editor.innerHTML = '<p><br></p>';

  document.getElementById('editorDateLabel').textContent = keyToLabel(key);
  document.getElementById('editorDateSub').textContent   = isToday(key)
    ? `Today · ${new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}`
    : keyToFull(key);

  const hasContent = stripTags(editor.innerHTML).trim().length > 0;
  document.getElementById('deleteBtn').style.display = (hasContent && !isToday(key)) ? '' : 'none';

  updateWordCount();
  setSaveStatus('saved');
  renderSidebar();
  if(isSearchMode) exitSearchMode();

  // Place cursor at end
  editor.focus();
  const range = document.createRange();
  range.selectNodeContents(editor);
  range.collapse(false);
  const sel = window.getSelection();
  sel.removeAllRanges();
  sel.addRange(range);
}

// ══════════════════════════════════════════
//  SAVE
// ══════════════════════════════════════════
function saveCurrentNote() {
  const editor = document.getElementById('notepad');
  saveNote(currentKey, editor.innerHTML);
}

function saveNow() {
  saveCurrentNote();
  setSaveStatus('saved');
  renderSidebar();
  showToast(`✅ Saved — ${keyToLabel(currentKey)}`);
  const hasContent = stripTags(document.getElementById('notepad').innerHTML).trim().length > 0;
  document.getElementById('deleteBtn').style.display = (hasContent && !isToday(currentKey)) ? '' : 'none';
}

function onNoteInput() {
  setSaveStatus('saving');
  clearTimeout(saveDebounce);
  saveDebounce = setTimeout(() => {
    saveCurrentNote();
    setSaveStatus('saved');
    renderSidebar();
  }, 1500);
  updateWordCount();
}

function startAutoSave() {
  setInterval(() => { saveCurrentNote(); setSaveStatus('saved'); renderSidebar(); }, 30000);
}

function setSaveStatus(state) {
  document.getElementById('saveDot').className = 'save-dot' + (state==='saving'?' saving':'');
  document.getElementById('saveText').textContent = state==='saving' ? 'Saving…' : 'Saved';
}

// ══════════════════════════════════════════
//  WORD COUNT
// ══════════════════════════════════════════
function updateWordCount() {
  const plain = stripTags(document.getElementById('notepad').innerHTML).trim();
  const words = plain ? plain.split(/\s+/).length : 0;
  document.getElementById('wordCount').textContent = words ? `${words} words` : '';
}

// ══════════════════════════════════════════
//  FORMATTING COMMANDS
// ══════════════════════════════════════════
function fmt(cmd, value) {
  document.getElementById('notepad').focus();
  document.execCommand(cmd, false, value||null);
  updateToolbarState();
}

function fmtBlock(tag) {
  document.getElementById('notepad').focus();
  // Toggle: if already in this tag, revert to p
  const sel = window.getSelection();
  if(sel.rangeCount) {
    const node = sel.getRangeAt(0).commonAncestorContainer;
    const el   = node.nodeType===3 ? node.parentElement : node;
    const curr = el.closest(tag);
    document.execCommand('formatBlock', false, curr ? 'p' : tag);
  } else {
    document.execCommand('formatBlock', false, tag);
  }
  updateToolbarState();
}

function fmtHighlight() {
  document.getElementById('notepad').focus();
  // Use backColor for highlight
  document.execCommand('hiliteColor', false, '#fef08a');
  updateToolbarState();
}

function insertNoteBlock() {
  const editor = document.getElementById('notepad');
  editor.focus();

  const sel = window.getSelection();
  if(!sel.rangeCount) return;

  const range = sel.getRangeAt(0);
  range.collapse(false);

  // Build: <hr class="note-block"> + label + new paragraph
  const time  = new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
  const frag  = document.createDocumentFragment();

  const hr    = document.createElement('hr');
  hr.className = 'note-block';
  hr.contentEditable = 'false';

  const label = document.createElement('span');
  label.className     = 'note-block-label';
  label.contentEditable = 'false';
  label.textContent   = `— Note · ${time} —`;

  const para  = document.createElement('p');
  para.innerHTML = '<br>';

  frag.appendChild(hr);
  frag.appendChild(label);
  frag.appendChild(para);

  // Make sure we're inserting after the current block
  let anchor = range.startContainer;
  while(anchor.parentElement && anchor.parentElement !== editor) anchor = anchor.parentElement;
  if(anchor === editor) {
    editor.appendChild(frag);
  } else {
    anchor.after(...frag.childNodes);
  }

  // Move cursor into new paragraph
  const newRange = document.createRange();
  newRange.setStart(para, 0);
  newRange.collapse(true);
  sel.removeAllRanges();
  sel.addRange(newRange);

  onNoteInput();
}

// Update toolbar button active states
function updateToolbarState() {
  const cmds = ['bold','italic','underline'];
  cmds.forEach(cmd => {
    const btn = document.querySelector(`.fmt-btn[title="${cmd.charAt(0).toUpperCase()+cmd.slice(1)}"]`);
    if(btn) btn.classList.toggle('active', document.queryCommandState(cmd));
  });
}

// ══════════════════════════════════════════
//  SIDEBAR
// ══════════════════════════════════════════
function renderSidebar() {
  const list    = document.getElementById('sidebarList');
  const index   = getIndex();
  const today   = todayKey();
  const allKeys = index.includes(today) ? index : [today, ...index];

  if(!allKeys.length) { list.innerHTML=`<div class="no-results">No notes yet.<br>Start typing!</div>`; return; }

  const groups = {};
  allKeys.forEach(k => {
    const gk = k.slice(0,7); // YYYY-MM
    if(!groups[gk]) groups[gk]=[];
    groups[gk].push(k);
  });

  let html='';
  Object.keys(groups).sort((a,b)=>b.localeCompare(a)).forEach(gk => {
    const [y,m] = gk.split('-');
    html += `<div class="sidebar-section">${MONTHS[parseInt(m)-1]} ${y}</div>`;
    groups[gk].forEach(k => {
      const plain   = stripTags(loadNote(k));
      const label   = keyToLabel(k);
      const isAct   = k===currentKey && !isSearchMode;
      const isT     = isToday(k);
      const preview = plain.split('\n').map(l=>l.trim()).find(l=>l.length>0) || (isT?'Today\'s note…':'Empty');
      const words   = plain.trim() ? plain.trim().split(/\s+/).length : 0;
      html += `<div class="day-item ${isAct?'active':''} ${isT?'today':''}" onclick="loadDay('${k}')">
        <div class="day-info">
          <div class="day-name">${esc(label)}${isT?`<span class="today-badge">Today</span>`:''}</div>
          <div class="day-preview">${esc(preview.slice(0,50))}${preview.length>50?'…':''}</div>
          ${words?`<div class="day-words">${words} words</div>`:''}
        </div>
      </div>`;
    });
  });
  list.innerHTML = html;
}

// ══════════════════════════════════════════
//  SEARCH
// ══════════════════════════════════════════
document.getElementById('sidebarSearch').addEventListener('input', function() {
  searchQuery = this.value.trim();
  const clear = document.getElementById('searchClear');
  const icon  = document.getElementById('searchIcon');
  clear.classList.toggle('visible', searchQuery.length>0);
  icon.style.display = searchQuery.length>0 ? 'none' : '';
  searchQuery.length >= 2 ? doSearch(searchQuery) : exitSearchMode();
});

function clearSearch() {
  document.getElementById('sidebarSearch').value='';
  document.getElementById('searchClear').classList.remove('visible');
  document.getElementById('searchIcon').style.display='';
  exitSearchMode();
  renderSidebar();
}

function doSearch(q) {
  isSearchMode = true;
  const ql  = q.toLowerCase();
  const hits = getAllNotes().filter(n=>n.text && n.text.toLowerCase().includes(ql)).map(({key,text}) => {
    const snippets=[];
    let pos=0;
    while((pos=text.toLowerCase().indexOf(ql,pos))!==-1){
      const s=Math.max(0,pos-80), e=Math.min(text.length,pos+q.length+80);
      let snip=text.slice(s,e);
      if(s>0) snip='…'+snip;
      if(e<text.length) snip+=('…');
      snippets.push(snip);
      pos+=q.length;
      if(snippets.length>=3) break;
    }
    return {key, label:keyToLabel(key), snippets};
  });

  // Sidebar
  document.getElementById('sidebarList').innerHTML = !hits.length
    ? `<div class="no-results">No matches</div>`
    : `<div class="sidebar-section">${hits.length} match${hits.length===1?'':'es'}</div>`
      + hits.map(({key,label,snippets})=>{
          const preview = snippets[0]||'';
          return `<div class="day-item ${isToday(key)?'today':''}" onclick="openFromSearch('${key}')">
            <div class="day-info">
              <div class="day-name">${highlightMatch(esc(label),q)}${isToday(key)?`<span class="today-badge">Today</span>`:''}</div>
              <div class="day-preview">${highlightMatch(esc(preview.replace(/…/g,'').slice(0,55)),q)}</div>
            </div>
          </div>`;
        }).join('');

  // Results pane
  const sa = document.getElementById('searchResultsArea');
  sa.style.display = 'flex';
  document.getElementById('notepadWrap').style.display = 'none';
  document.getElementById('srHeader').textContent = hits.length
    ? `${hits.length} note${hits.length===1?'':'s'} matched "${q}"`
    : `No results for "${q}"`;
  document.getElementById('srSub').textContent = hits.length ? 'Click a result to open that day.' : '';
  document.getElementById('srList').innerHTML = !hits.length
    ? `<div class="no-sr"><div class="icon">🔍</div><div>No notes contain "<strong>${esc(q)}</strong>"</div></div>`
    : hits.map(h=>`
        <div class="sr-result" onclick="openFromSearch('${h.key}')">
          <div class="sr-date">${esc(h.label)}</div>
          ${h.snippets.map(s=>`<div class="sr-snippet">${highlightMatch(esc(s),q)}</div>`).join('<hr style="border:none;border-top:1px dashed var(--green-200);margin:5px 0;">')}
        </div>`).join('');
}

function openFromSearch(key) { clearSearch(); loadDay(key); }
function exitSearchMode() {
  isSearchMode=false;
  document.getElementById('searchResultsArea').style.display='none';
  document.getElementById('notepadWrap').style.display='flex';
  renderSidebar();
}

// ══════════════════════════════════════════
//  DELETE
// ══════════════════════════════════════════
function confirmDelete() {
  document.getElementById('deleteModalMsg').innerHTML =
    `This will permanently delete the note for <strong>${keyToLabel(currentKey)}</strong>. This can't be undone.`;
  document.getElementById('deleteModal').classList.add('open');
}
function closeDeleteModal() { document.getElementById('deleteModal').classList.remove('open'); }
function doDelete() {
  const k=currentKey;
  deleteNote(k);
  closeDeleteModal();
  showToast(`🗑 Deleted — ${keyToLabel(k)}`);
  loadDay(todayKey());
}

// ══════════════════════════════════════════
//  KEYBOARD SHORTCUTS
// ══════════════════════════════════════════
function setupShortcuts() {
  document.addEventListener('keydown', e => {
    if((e.metaKey||e.ctrlKey) && e.key==='s') { e.preventDefault(); saveNow(); }
    if((e.metaKey||e.ctrlKey) && e.key==='f' && document.activeElement!==document.getElementById('sidebarSearch')) {
      e.preventDefault();
      document.getElementById('sidebarSearch').focus();
      document.getElementById('sidebarSearch').select();
    }
    if(e.key==='Escape' && isSearchMode) clearSearch();
  });

  // Update toolbar state on selection change
  document.addEventListener('selectionchange', updateToolbarState);
}

// ══════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════
function esc(s) {
  if(!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function highlightMatch(text, q) {
  if(!q||q.length<2) return text;
  return text.replace(new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi'), '<mark class="search-hit">$1</mark>');
}
function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}

// ══════════════════════════════════════════
//  EDITOR EVENTS
// ══════════════════════════════════════════
document.getElementById('notepad').addEventListener('input', onNoteInput);

// Paste as plain text to avoid style bleed from external sources
document.getElementById('notepad').addEventListener('paste', e => {
  e.preventDefault();
  const text = (e.clipboardData||window.clipboardData).getData('text/plain');
  document.execCommand('insertText', false, text);
});
</script>
